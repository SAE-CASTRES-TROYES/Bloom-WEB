name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_JEU_URL: ${{ secrets.NEXT_PUBLIC_JEU_URL }}
        run: npm run build

      - name: Sync build to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          # Les excludes doivent passer par switches : l'input "exclude" n'existe pas
          # sur cette action (sinon --delete supprime .env.local à chaque déploiement).
          switches: -avz --delete --exclude='.git' --exclude='.env*' --exclude='node_modules' --exclude='setup-github-cicd.sh' --exclude='bloom.mariusnogueron.fr.conf'
          path: ./
          remote_path: /var/www/bloom/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Écrit APRÈS le rsync pour qu'un éventuel --delete ne puisse pas l'effacer.
      - name: Write .env.local on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > /var/www/bloom/.env.local << 'ENVEOF'
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_SECRET_KEY=${{ secrets.SUPABASE_SECRET_KEY }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            NEXT_PUBLIC_JEU_URL=${{ secrets.NEXT_PUBLIC_JEU_URL }}
            ENVEOF

      - name: Restart PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/bloom
            npm install --production
            # Charge .env.local dans l'environnement du process PM2 (next start
            # ne lit pas toujours .env.local au runtime → on force via --update-env)
            set -a; . /var/www/bloom/.env.local; set +a
            pm2 restart bloom-web --update-env || pm2 start "npm start" --name bloom-web --update-env
            pm2 save
            echo "Deployed: $(date)"
